name: Renewal safety checks

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renewal-safety-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  safety-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Set up Java 21 for Firestore Emulator
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install locked dependencies
        run: npm ci

      - name: Install Firebase CLI for local Emulator only
        run: npm install --global firebase-tools@15.18.0

      - name: Lint Functions
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Run static smoke tests
        run: npm run test:smoke

      - name: Run Firestore Emulator tests
        run: npm run test:emulator
