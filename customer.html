<style>
:root{--bg:#f7f8fa;--card:#fff;--primary:#7b3f1a;--primary2:#a05a2c;--gold:#f8efe2;--text:#1f2328;--sub:#6b7280;--border:#e5e7eb;--success:#2e7d52;--error:#c0392b;--closed:#9e9e9e;--shadow:0 2px 12px rgba(15,23,42,.06);--radius:14px}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto}.screen{display:none}.screen.active{display:block}#loading-screen{position:fixed;inset:0;background:var(--primary);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#f0d090;transition:.3s}.spinner{width:36px;height:36px;border:3px solid rgba(240,208,144,.3);border-top-color:#f0d090;border-radius:50%;animation:spin .8s linear infinite;margin-top:24px}@keyframes spin{to{transform:rotate(360deg)}}#auth-screen{min-height:100vh;background:var(--primary);display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px}.auth-logo{text-align:center;margin-bottom:24px}.auth-logo .kr{font-family:'Noto Serif KR',serif;font-size:28px;color:#f0d090;letter-spacing:4px;font-weight:700}.auth-logo .sub{font-size:13px;color:rgba(240,208,144,.65);letter-spacing:2px;margin-top:4px}.auth-card{background:#fff;border-radius:18px;padding:22px 20px;width:100%;max-width:400px}.auth-title{font-size:18px;font-weight:800;margin-bottom:18px}.form-group{margin-bottom:12px}.form-label{display:block;font-size:13px;font-weight:700;color:var(--sub);margin-bottom:6px}.form-input{width:100%;padding:12px 13px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;font-family:inherit;background:#f7f8fa;outline:none}.form-input:focus{background:#fff;border-color:var(--primary)}.form-row{display:flex;gap:8px}.form-row .form-group{flex:1}.auth-submit,.submit-btn{width:100%;background:var(--primary);color:#fff;border:0;border-radius:12px;padding:14px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:8px}.auth-submit:active,.submit-btn:active{transform:scale(.99)}.auth-toggle{text-align:center;margin-top:14px;font-size:14px;color:var(--sub)}.auth-toggle span{color:var(--primary);font-weight:800;text-decoration:underline;cursor:pointer}.error-msg{display:none;color:var(--error);font-size:13px;margin-top:10px;text-align:center;padding:9px;background:#ffebee;border-radius:10px}.error-msg.show{display:block}.default-hint{font-size:11px;color:var(--sub);margin-top:4px}.app-header{background:#fff;color:var(--text);padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;min-height:48px}.header-title{font-family:'Noto Serif KR',serif;font-size:16px;color:var(--primary);font-weight:700}.header-biz{font-size:11px;color:var(--sub);text-align:right;max-width:105px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.btn-logout{background:none;border:1px solid var(--border);color:var(--sub);padding:4px 9px;border-radius:20px;font-size:12px;cursor:pointer}.tab-bar{display:flex;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:48px;z-index:99}.tab-btn{flex:1;padding:10px 8px;font-size:13px;font-weight:700;color:var(--sub);background:none;border:0;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px}.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}.content-area{padding:12px 12px 88px}.date-badge{display:inline-flex;align-items:center;background:var(--gold);color:var(--primary);padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800;margin-bottom:10px}.closed-banner{display:none;background:#fff3cd;border:1px solid #ffcc80;border-radius:var(--radius);padding:10px 12px;margin-bottom:10px;font-size:13px;color:#7d5500}.closed-banner.show{display:flex;gap:10px}.order-card,.week-item{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border)}.order-card{padding:14px;margin-bottom:10px}.order-card.submitted{border-color:var(--success);background:#f0fff6}.order-card.closed-card{opacity:.78;background:#f8f8f8}.qty-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}.qty-row:last-of-type{border-bottom:0}.qty-label{display:flex;align-items:center;gap:10px}.qty-icon{width:34px;height:34px;background:var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}.qty-name{font-size:15px;font-weight:800}.qty-unit{font-size:12px;color:var(--sub)}.qty-control{display:flex;align-items:center;background:#f7f8fa;border-radius:12px;overflow:hidden;border:1px solid var(--border)}.qty-btn{width:40px;height:40px;font-size:21px;color:var(--primary);background:none;border:0;cursor:pointer}.qty-btn:disabled{color:var(--closed)}.qty-value{width:42px;text-align:center;font-size:21px;font-weight:900;color:var(--primary)}.submit-btn{font-size:15px;margin-top:14px}.submit-btn:disabled{background:var(--closed)}.submit-btn.submitted-btn{background:var(--success)}.submitted-badge{display:none;align-items:center;justify-content:center;gap:8px;color:var(--success);font-size:13px;font-weight:800;margin-top:10px}.week-item{padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}.week-item.is-past{background:#f5f5f5;opacity:.75;cursor:default}.week-item.is-today{border-color:#c8922a;border-width:2px}.week-item.is-submitted{border-color:var(--success)}.week-day{font-size:15px;font-weight:900}.week-day.today-text{color:var(--primary)}.week-status{font-size:12px;font-weight:800;padding:5px 9px;border-radius:20px;white-space:nowrap}.status-pending{background:var(--gold);color:var(--primary)}.status-submitted{background:#d4edda;color:var(--success)}.status-past{background:#eee;color:var(--closed)}.status-closed{background:#ffe0b2;color:#e65100}.section-title{font-size:13px;font-weight:800;color:var(--sub);margin-bottom:8px;padding-left:4px}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:none;align-items:flex-end;justify-content:center}.modal-overlay.open{display:flex}.modal-sheet{background:#fff;width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:18px 14px 28px}.modal-handle{width:40px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 16px}.modal-date{font-size:17px;font-weight:900;color:var(--primary);margin-bottom:12px;text-align:center}.toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 16px;border-radius:24px;font-size:13px;font-weight:700;opacity:0;transition:.3s;z-index:2000;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast.success{background:var(--success)}.toast.error-toast{background:var(--error)}@media(max-width:420px){body{max-width:100%}.auth-card{padding:20px 18px}.auth-logo .kr{font-size:24px}}

<div id="loading-screen"><div style="font-family:'Noto Serif KR',serif;font-size:28px;font-weight:700;letter-spacing:4px">궁중수라간</div><div style="font-size:13px;letter-spacing:2px;margin-top:6px;opacity:.7">월식 도시락 주문</div><div class="spinner"></div></div>
<div id="auth-screen" class="screen"><div class="auth-logo"><div class="kr">궁중수라간</div><div class="sub">월식 도시락 주문 시스템</div></div><div class="auth-card" id="login-form"><div class="auth-title">로그인</div><div class="form-group"><label class="form-label">이메일</label><input class="form-input" type="email" id="login-email" placeholder="이메일 입력"></div><div class="form-group"><label class="form-label">비밀번호</label><input class="form-input" type="password" id="login-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter') doLogin()"></div><div class="error-msg" id="login-error"></div><button class="auth-submit" onclick="doLogin()">로그인</button><div class="auth-toggle">처음 이용하시나요? <span onclick="showRegister()">회원가입</span></div></div><div class="auth-card" id="register-form" style="display:none"><div class="auth-title">회원가입</div><div class="form-group"><label class="form-label">업체명 <span style="color:red">*</span></label><input class="form-input" type="text" id="reg-bizname" placeholder="예) 진주내과의원"></div><div class="form-group"><label class="form-label">이메일 <span style="color:red">*</span></label><input class="form-input" type="email" id="reg-email" placeholder="이메일 주소"></div><div class="form-group"><label class="form-label">휴대폰 번호</label><input class="form-input" type="tel" id="reg-phone" placeholder="010-0000-0000"></div><div class="form-group"><label class="form-label">비밀번호 <span style="color:red">*</span></label><input class="form-input" type="password" id="reg-pw" placeholder="6자리 이상" onkeydown="if(event.key==='Enter') doRegister()"></div><div class="form-row"><div class="form-group"><label class="form-label">기본 도시락 수</label><input class="form-input" type="number" id="reg-lunch" value="2" min="0" max="50"><div class="default-hint">매일 기본으로 채워집니다</div></div><div class="form-group"><label class="form-label">기본 샐러드 수</label><input class="form-input" type="number" id="reg-salad" value="0" min="0" max="50"></div></div><div class="error-msg" id="reg-error"></div><button class="auth-submit" onclick="doRegister()">가입하기</button><div class="auth-toggle">이미 계정이 있으신가요? <span onclick="showLogin()">로그인</span></div></div></div>
<div id="main-screen" class="screen"><div class="app-header"><div class="header-title">궁중수라간 🍱</div><div style="display:flex;align-items:center;gap:10px"><div class="header-biz" id="header-bizname"></div><button class="btn-logout" onclick="doLogout()">로그아웃</button></div></div><div class="tab-bar"><button class="tab-btn active" id="tab-today" onclick="switchTab('today')">오늘 주문</button><button class="tab-btn" id="tab-week" onclick="switchTab('week')">평일 일정</button></div><div id="pane-today" class="content-area"><div class="date-badge" id="today-badge">날짜 로딩중...</div><div class="closed-banner" id="closed-banner"><span>⏰</span><div><strong id="closed-title">오늘 주문이 마감되었습니다</strong><br><span id="closed-desc" style="font-size:12px">주문 마감: 오전 9시 20분</span></div></div><div class="order-card" id="today-card"><div class="qty-row"><div class="qty-label"><div class="qty-icon">🍱</div><div><div class="qty-name">도시락</div><div class="qty-unit">개</div></div></div><div class="qty-control"><button class="qty-btn" id="lunch-minus" onclick="changeQty('lunch',-1)">−</button><div class="qty-value" id="lunch-value">2</div><button class="qty-btn" id="lunch-plus" onclick="changeQty('lunch',1)">+</button></div></div><div class="qty-row"><div class="qty-label"><div class="qty-icon">🥗</div><div><div class="qty-name">샐러드</div><div class="qty-unit">개</div></div></div><div class="qty-control"><button class="qty-btn" id="salad-minus" onclick="changeQty('salad',-1)">−</button><div class="qty-value" id="salad-value">0</div><button class="qty-btn" id="salad-plus" onclick="changeQty('salad',1)">+</button></div></div><button class="submit-btn" id="submit-btn" onclick="submitOrder('today')">주문 전송하기</button><div class="submitted-badge" id="submitted-badge">✅ 전송 완료</div></div></div><div id="pane-week" class="content-area" style="display:none"><div class="section-title">이번 주 평일 주문 현황</div><div id="week-list"></div></div></div>
<div class="modal-overlay" id="day-modal" onclick="closeModal(event)"><div class="modal-sheet"><div class="modal-handle"></div><div class="modal-date" id="modal-date-text"></div><div id="modal-content"></div><button class="submit-btn" id="modal-submit-btn" onclick="submitOrder('modal')">주문 전송하기</button><div class="submitted-badge" id="modal-submitted-badge">✅ 전송 완료</div></div></div><div class="toast" id="toast"></div>
<script>
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW 오류:',e)))}
let currentUser=null,userProfile=null,todayLunch=0,todaySalad=0,modalDateStr='',modalLunch=0,modalSalad=0;function getKST(){const now=new Date();return new Date(now.getTime()+9*60*60*1000)}function dateStr(d){return d.toISOString().split('T')[0]}function dayOfWeek(dStr){return new Date(`${dStr}T00:00:00+09:00`).getDay()}function isWeekend(dStr){const d=dayOfWeek(dStr);return d===0||d===6}function isClosed(){const kst=getKST();return kst.getUTCHours()>9||(kst.getUTCHours()===9&&kst.getUTCMinutes()>=20)}function isPastDate(dStr){return dStr<dateStr(getKST())}function formatDateKR(dStr){const[,m,d]=dStr.split('-');const days=['일','월','화','수','목','금','토'];return `${parseInt(m)}월 ${parseInt(d)}일 (${days[dayOfWeek(dStr)]})`}
auth.onAuthStateChanged(async(user)=>{hideLoading();if(user){currentUser=user;await loadUserProfile();showMain()}else{showAuth()}});async function loadUserProfile(){const doc=await db.collection('users').doc(currentUser.uid).get();if(doc.exists){userProfile=doc.data()}else{userProfile={businessName:currentUser.email,email:currentUser.email,defaultLunch:2,defaultSalad:0};await db.collection('users').doc(currentUser.uid).set({...userProfile,createdAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true})}document.getElementById('header-bizname').textContent=userProfile.businessName;todayLunch=userProfile.defaultLunch||2;todaySalad=userProfile.defaultSalad||0}
async function doLogin(){const email=document.getElementById('login-email').value.trim();const pw=document.getElementById('login-pw').value;clearError('login-error');try{await auth.signInWithEmailAndPassword(email,pw)}catch(e){showError('login-error','이메일 또는 비밀번호가 올바르지 않습니다.')}}
async function doRegister(){const bizname=document.getElementById('reg-bizname').value.trim();const email=document.getElementById('reg-email').value.trim();const phone=document.getElementById('reg-phone').value.trim();const pw=document.getElementById('reg-pw').value;const lunch=parseInt(document.getElementById('reg-lunch').value)||2;const salad=parseInt(document.getElementById('reg-salad').value)||0;clearError('reg-error');if(!bizname||!email||!pw){showError('reg-error','업체명, 이메일, 비밀번호는 필수입니다.');return}if(pw.length<6){showError('reg-error','비밀번호는 6자리 이상이어야 합니다.');return}try{const cred=await auth.createUserWithEmailAndPassword(email,pw);await db.collection('users').doc(cred.user.uid).set({businessName:bizname,email,phone,defaultLunch:lunch,defaultSalad:salad,createdAt:firebase.firestore.FieldValue.serverTimestamp()})}catch(e){if(e.code==='auth/email-already-in-use'){try{await auth.signInWithEmailAndPassword(email,pw);return}catch(loginError){showLogin();document.getElementById('login-email').value=email;document.getElementById('login-pw').value='';showError('login-error','이미 가입된 이메일입니다. 기존 비밀번호로 로그인해주세요.');return}}showError('reg-error','가입 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.')}}function doLogout(){auth.signOut()}
function hideLoading(){const el=document.getElementById('loading-screen');el.style.opacity='0';setTimeout(()=>el.style.display='none',300)}function showAuth(){document.getElementById('auth-screen').classList.add('active');document.getElementById('main-screen').classList.remove('active')}function showMain(){document.getElementById('auth-screen').classList.remove('active');document.getElementById('main-screen').classList.add('active');renderToday();renderWeek()}function showLogin(){document.getElementById('login-form').style.display='block';document.getElementById('register-form').style.display='none';clearError('reg-error')}function showRegister(){document.getElementById('login-form').style.display='none';document.getElementById('register-form').style.display='block';clearError('login-error')}function switchTab(tab){document.getElementById('tab-today').classList.toggle('active',tab==='today');document.getElementById('tab-week').classList.toggle('active',tab==='week');document.getElementById('pane-today').style.display=tab==='today'?'block':'none';document.getElementById('pane-week').style.display=tab==='week'?'block':'none'}
async function renderToday(){const today=dateStr(getKST());const weekend=isWeekend(today);const closed=isClosed();document.getElementById('today-badge').textContent='📅 '+formatDateKR(today);const banner=document.getElementById('closed-banner');banner.classList.remove('show');if(weekend){banner.classList.add('show');document.getElementById('closed-title').textContent='토·일은 월식 배송이 없습니다';document.getElementById('closed-desc').textContent='평일 일정에서 월~금만 주문할 수 있습니다.'}else if(closed){banner.classList.add('show');document.getElementById('closed-title').textContent='오늘 주문이 마감되었습니다';document.getElementById('closed-desc').textContent='주문 마감: 오전 9시 20분'}const snap=await db.collection('orders').doc(today).collection('items').doc(currentUser.uid).get();const submitBtn=document.getElementById('submit-btn');if(snap.exists){const data=snap.data();todayLunch=data.lunchCount;todaySalad=data.saladCount;setCardSubmitted(true);setQtyDisabled(closed||weekend)}else{todayLunch=userProfile?.defaultLunch||2;todaySalad=userProfile?.defaultSalad||0;setCardSubmitted(false);if(closed||weekend){submitBtn.disabled=true;submitBtn.textContent=weekend?'배송 없는 날':'주문 마감됨';setQtyDisabled(true)}else{setQtyDisabled(false)}}document.getElementById('lunch-value').textContent=todayLunch;document.getElementById('salad-value').textContent=todaySalad}
function setCardSubmitted(yes){const btn=document.getElementById('submit-btn');const badge=document.getElementById('submitted-badge');if(yes){btn.className='submit-btn submitted-btn';btn.textContent='✅ 전송 완료 (수정 후 재전송 가능)';btn.disabled=false;badge.style.display='flex'}else{btn.className='submit-btn';btn.textContent='주문 전송하기';btn.disabled=false;badge.style.display='none'}}function setQtyDisabled(disabled){['lunch-minus','lunch-plus','salad-minus','salad-plus'].forEach(id=>document.getElementById(id).disabled=disabled)}function changeQty(type,delta){if(type==='lunch'){todayLunch=Math.max(0,Math.min(50,todayLunch+delta));document.getElementById('lunch-value').textContent=todayLunch}else{todaySalad=Math.max(0,Math.min(50,todaySalad+delta));document.getElementById('salad-value').textContent=todaySalad}}function changeModalQty(type,delta){if(type==='lunch'){modalLunch=Math.max(0,Math.min(50,modalLunch+delta));document.getElementById('modal-lunch-val').textContent=modalLunch}else{modalSalad=Math.max(0,Math.min(50,modalSalad+delta));document.getElementById('modal-salad-val').textContent=modalSalad}}
async function submitOrder(source){let targetDate,lunch,salad;if(source==='today'){targetDate=dateStr(getKST());lunch=todayLunch;salad=todaySalad}else{targetDate=modalDateStr;lunch=modalLunch;salad=modalSalad}if(isWeekend(targetDate)){showToast('토·일은 월식 배송이 없습니다.','error');return}if(targetDate===dateStr(getKST())&&isClosed()){showToast('오늘 주문은 마감되었습니다.','error');return}const btn=source==='today'?document.getElementById('submit-btn'):document.getElementById('modal-submit-btn');btn.disabled=true;btn.textContent='전송 중...';try{await db.collection('orders').doc(targetDate).collection('items').doc(currentUser.uid).set({businessName:userProfile.businessName,lunchCount:lunch,saladCount:salad,submittedAt:firebase.firestore.FieldValue.serverTimestamp(),uid:currentUser.uid});showToast('✅ 주문이 전송되었습니다!','success');if(source==='today'){setCardSubmitted(true);setQtyDisabled(false)}else{closeModal();renderWeek()}}catch(e){showToast('전송 실패. 다시 시도해주세요.','error');btn.disabled=false;btn.textContent='주문 전송하기'}}
async function renderWeek(){const kst=getKST();const todayStr=dateStr(kst);const dow=kst.getUTCDay();const monday=new Date(kst);monday.setUTCDate(kst.getUTCDate()-(dow===0?6:dow-1));const days=[];for(let i=0;i<5;i++){const d=new Date(monday);d.setUTCDate(monday.getUTCDate()+i);days.push(dateStr(d))}const snaps=await Promise.all(days.map(d=>db.collection('orders').doc(d).collection('items').doc(currentUser.uid).get()));const list=document.getElementById('week-list');list.innerHTML='';days.forEach((ds,i)=>{const snap=snaps[i],isToday=ds===todayStr,isPast=isPastDate(ds),submitted=snap.exists,todayClosed=isToday&&isClosed();let cls='status-pending',txt='미입력';if(submitted){cls='status-submitted';txt=`도시락 ${snap.data().lunchCount} / 샐러드 ${snap.data().saladCount}`}else if(isPast){cls='status-past';txt='입력없음'}else if(todayClosed){cls='status-closed';txt='마감'}const clickable=!isPast&&!(todayClosed&&!submitted);const el=document.createElement('div');el.className=`week-item${isToday?' is-today':''}${isPast?' is-past':''}${submitted?' is-submitted':''}`;el.innerHTML=`<div><div class="week-day${isToday?' today-text':''}">${formatDateKR(ds)}${isToday?' 오늘':''}</div></div><div class="week-status ${cls}">${txt}</div>`;if(clickable)el.onclick=()=>openDayModal(ds,submitted?snap.data():null);list.appendChild(el)})}
function openDayModal(ds,existing){if(isWeekend(ds)){showToast('토·일은 월식 배송이 없습니다.','error');return}modalDateStr=ds;modalLunch=existing?existing.lunchCount:(userProfile?.defaultLunch||2);modalSalad=existing?existing.saladCount:(userProfile?.defaultSalad||0);document.getElementById('modal-date-text').textContent=formatDateKR(ds);document.getElementById('modal-content').innerHTML=`<div class="qty-row"><div class="qty-label"><div class="qty-icon">🍱</div><div><div class="qty-name">도시락</div></div></div><div class="qty-control"><button class="qty-btn" onclick="changeModalQty('lunch',-1)">−</button><div class="qty-value" id="modal-lunch-val">${modalLunch}</div><button class="qty-btn" onclick="changeModalQty('lunch',1)">+</button></div></div><div class="qty-row"><div class="qty-label"><div class="qty-icon">🥗</div><div><div class="qty-name">샐러드</div></div></div><div class="qty-control"><button class="qty-btn" onclick="changeModalQty('salad',-1)">−</button><div class="qty-value" id="modal-salad-val">${modalSalad}</div><button class="qty-btn" onclick="changeModalQty('salad',1)">+</button></div></div>`;const btn=document.getElementById('modal-submit-btn');btn.disabled=false;btn.className=existing?'submit-btn submitted-btn':'submit-btn';btn.textContent=existing?'✅ 수정 후 재전송':'주문 전송하기';document.getElementById('modal-submitted-badge').style.display='none';document.getElementById('day-modal').classList.add('open')}function closeModal(e){if(!e||e.target===document.getElementById('day-modal'))document.getElementById('day-modal').classList.remove('open')}function clearError(id){const el=document.getElementById(id);el.textContent='';el.classList.remove('show')}function showError(id,msg){const el=document.getElementById(id);el.textContent=msg;el.classList.add('show')}function showToast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast show ${type==='success'?'success':type==='error'?'error-toast':''}`;setTimeout(()=>t.className='toast',2500)}
</script></body></html>
