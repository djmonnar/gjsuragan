:var(--gold);letter-spacing:2px}.top-right{display:flex;align-items:center;gap:10px}.admin-badge{background:rgba(240,208,144,.18);color:var(--gold);padding:4px 10px;border-radius:20px;font-size:12px}.btn-logout{background:none;border:1px solid rgba(240,208,144,.4);color:var(--gold);padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer}.controls-bar{background:#fff;border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}.date-nav{display:flex;align-items:center;gap:8px}.nav-btn{width:36px;height:36px;background:var(--bg);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:16px}.current-date{font-size:16px;font-weight:700;color:var(--primary);min-width:150px;text-align:center}.today-btn,.refresh-btn{border:0;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}.today-btn{background:var(--primary);color:#fff}.refresh-btn{background:var(--gold2);color:var(--primary);margin-left:auto}.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px 24px}.summary-card{background:#fff;border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border)}.summary-label{font-size:12px;color:var(--sub);margin-bottom:6px;font-weight:600}.summary-value{font-size:28px;font-weight:800;color:var(--primary)}.summary-unit{font-size:13px;color:var(--sub);margin-left:2px}.table-section,.not-submitted-section{padding:0 24px 36px}.section-title{font-size:14px;font-weight:700;color:var(--sub);margin-bottom:12px;padding-top:4px}.order-table{width:100%;background:#fff;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border);border-collapse:separate;border-spacing:0}.order-table thead tr{background:var(--primary);color:var(--gold)}.order-table th{padding:13px 16px;font-size:13px;text-align:left}.order-table td{padding:14px 16px;font-size:14px;vertical-align:middle;border-bottom:1px solid #f0e7dc}.order-table tbody tr:last-child td{border-bottom:0}.biz-name{font-weight:700}.qty-cell{text-align:center;font-size:18px;font-weight:800;color:var(--primary)}.time-cell{font-size:12px;color:var(--sub)}.no-order-row td{text-align:center;padding:48px 16px;color:var(--sub);font-size:15px}.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;background:var(--success)}.not-submitted-list{display:flex;flex-wrap:wrap;gap:8px}.not-chip{background:#fff3e0;border:1px solid #ffb74d;color:#e65100;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600}.no-not{color:var(--success);font-size:14px;font-weight:700;padding:8px 0}.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:11px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all .3s;z-index:2000;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:600px){.top-bar{padding:14px 16px}.controls-bar,.summary-row{padding:12px 16px}.table-section,.not-submitted-section{padding-left:16px;padding-right:16px}.summary-value{font-size:22px}.current-date{min-width:130px;font-size:14px}.order-table th,.order-table td{padding:11px 10px}}

<div id="main-screen"><div class="top-bar"><div class="top-title">🍱 주문 현황</div><div class="top-right"><span class="admin-badge">관리자</span><button class="btn-logout" onclick="doAdminLogout()">로그아웃</button></div></div><div class="controls-bar"><div class="date-nav"><button class="nav-btn" onclick="changeDate(-1)">◀</button><div class="current-date" id="current-date-label">날짜</div><button class="nav-btn" onclick="changeDate(1)">▶</button></div><button class="today-btn" onclick="goToday()">오늘</button><button class="refresh-btn" onclick="loadOrders()">🔄 새로고침</button></div><div class="summary-row"><div class="summary-card"><div class="summary-label">📋 제출 업체</div><div class="summary-value" id="sum-count">0<span class="summary-unit">곳</span></div></div><div class="summary-card"><div class="summary-label">🍱 총 도시락</div><div class="summary-value" id="sum-lunch">0<span class="summary-unit">개</span></div></div><div class="summary-card"><div class="summary-label">🥗 총 샐러드</div><div class="summary-value" id="sum-salad">0<span class="summary-unit">개</span></div></div></div><div class="table-section"><div class="section-title">업체별 주문 내역</div><table class="order-table"><thead><tr><th>#</th><th>업체명</th><th style="text-align:center">🍱 도시락</th><th style="text-align:center">🥗 샐러드</th><th>전송 시간</th></tr></thead><tbody id="order-tbody"><tr class="no-order-row"><td colspan="5">불러오는 중...</td></tr></tbody></table></div><div class="not-submitted-section"><div class="section-title" id="not-sub-title">아직 미제출 업체</div><div class="not-submitted-list" id="not-submitted-list"></div></div></div><div class="toast" id="toast"></div>
<script>
let currentDateStr='';let allUsers={};function getKST(){const now=new Date();return new Date(now.getTime()+9*60*60*1000)
}
function dateStr(d) {
  return d.toISOString().split('T')[0];
}
function formatDateKR(dStr) {
  const [y, m, d] = dStr.split('-');
  const days = ['일','월','화','수','목','금','토'];
  const dt = new Date(`${dStr}T00:00:00+09:00`);
  return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일 (${days[dt.getDay()]})`;
}
function formatTime(ts) {
  if (!ts) return '-';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
  const h = String(kst.getUTCHours()).padStart(2, '0');
  const m = String(kst.getUTCMinutes()).padStart(2, '0');
  return `${h}:${m}`;
}

let currentDateStr='';let allUsers={};function getKST(){const now=new Date();return new Date(now.getTime()+9*60*60*1000)}function dateStr(d){return d.toISOString().split('T')[0]}function formatDateKR(dStr){const[y,m,d]=dStr.split('-');const days=['일','월','화','수','목','금','토'];const dt=new Date(`${dStr}T00:00:00+09:00`);return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일 (${days[dt.getDay()]})`}function isWeekendDate(dStr){const dt=new Date(`${dStr}T00:00:00+09:00`);const day=dt.getDay();return day===0||day===6}function formatTime(ts){if(!ts)return'-';const d=ts.toDate?ts.toDate():new Date(ts);const kst=new Date(d.getTime()+9*60*60*1000);return `${String(kst.getUTCHours()).padStart(2,'0')}:${String(kst.getUTCMinutes()).padStart(2,'0')}`}
auth.onAuthStateChanged(async(user)=>{document.getElementById('loading-screen').style.display='none';const authScreen=document.getElementById('auth-screen');const mainScreen=document.getElementById('main-screen');if(user&&ADMIN_EMAILS.includes(user.email)){authScreen.classList.remove('active');mainScreen.classList.add('active');currentDateStr=dateStr(getKST());await loadAllUsers();updateDateLabel();loadOrders()}else if(user){mainScreen.classList.remove('active');authScreen.classList.add('active');await auth.signOut();showToast('관리자 계정이 아닙니다.')}else{mainScreen.classList.remove('active');authScreen.classList.add('active')}});
async function doAdminLogin(){const email=document.getElementById('admin-email').value.trim();const pw=document.getElementById('admin-pw').value;const errorEl=document.getElementById('login-error');errorEl.classList.remove('show');if(!ADMIN_EMAILS.includes(email)||pw!==ADMIN_PASSWORD){errorEl.classList.add('show');return}try{await auth.signInWithEmailAndPassword(email,pw)}catch(e){errorEl.classList.add('show')}}function doAdminLogout(){auth.signOut();document.getElementById('main-screen').classList.remove('active');document.getElementById('auth-screen').classList.add('active')}
async function loadAllUsers(){allUsers={};try{const snap=await db.collection('users').get();snap.forEach(doc=>{allUsers[doc.id]=doc.data()})}catch(e){console.log('유저 로드 오류:',e)}}function changeDate(delta){const d=new Date(currentDateStr+'T00:00:00');d.setDate(d.getDate()+delta);currentDateStr=dateStr(d);updateDateLabel();loadOrders()}function goToday(){currentDateStr=dateStr(getKST());updateDateLabel();loadOrders()}function updateDateLabel(){document.getElementById('current-date-label').textContent=formatDateKR(currentDateStr)}
async function loadOrders(){document.getElementById('order-tbody').innerHTML='<tr class="no-order-row"><td colspan="5">불러오는 중...</td></tr>';document.getElementById('not-submitted-list').innerHTML='';if(isWeekendDate(currentDateStr)){document.getElementById('order-tbody').innerHTML='<tr class="no-order-row"><td colspan="5">토·일은 월식 배송이 없습니다</td></tr>';document.getElementById('sum-count').innerHTML='0<span class="summary-unit">곳</span>';document.getElementById('sum-lunch').innerHTML='0<span class="summary-unit">개</span>';document.getElementById('sum-salad').innerHTML='0<span class="summary-unit">개</span>';document.getElementById('not-sub-title').textContent='🚚 토·일 배송 없음';document.getElementById('not-submitted-list').innerHTML='<div class="no-not">토요일·일요일은 주문 확인 대상에서 제외됩니다.</div>';return}try{const snap=await db.collection('orders').doc(currentDateStr).collection('items').get();const orders=[];snap.forEach(doc=>orders.push({uid:doc.id,...doc.data()}));orders.sort((a,b)=>(a.businessName||'').localeCompare(b.businessName||'','ko'));let totalLunch=0,totalSalad=0;const tbody=document.getElementById('order-tbody');if(orders.length===0){tbody.innerHTML='<tr class="no-order-row"><td colspan="5">아직 주문이 없습니다</td></tr>'}else{tbody.innerHTML='';orders.forEach((o,i)=>{totalLunch+=o.lunchCount||0;totalSalad+=o.saladCount||0;const tr=document.createElement('tr');tr.innerHTML=`<td style="color:var(--sub);font-size:13px">${i+1}</td><td class="biz-name"><span class="dot"></span>${o.businessName||'-'}</td><td class="qty-cell">${o.lunchCount??'-'}</td><td class="qty-cell">${o.saladCount??'-'}</td><td class="time-cell">${formatTime(o.submittedAt)}</td>`;tbody.appendChild(tr)})}document.getElementById('sum-count').innerHTML=`${orders.length}<span class="summary-unit">곳</span>`;document.getElementById('sum-lunch').innerHTML=`${totalLunch}<span class="summary-unit">개</span>`;document.getElementById('sum-salad').innerHTML=`${totalSalad}<span class="summary-unit">개</span>`;renderNotSubmitted(orders)}catch(e){document.getElementById('order-tbody').innerHTML='<tr class="no-order-row"><td colspan="5">불러오기 실패: '+e.message+'</td></tr>'}}
function renderNotSubmitted(submitted){const submittedUids=new Set(submitted.map(o=>o.uid));const notSub=Object.entries(allUsers).filter(([uid])=>!submittedUids.has(uid)).map(([,u])=>u.businessName).filter(Boolean);const container=document.getElementById('not-submitted-list');const title=document.getElementById('not-sub-title');if(notSub.length===0){title.textContent='✅ 모든 업체 제출 완료';container.innerHTML='<div class="no-not">전체 업체가 주문을 완료했습니다 🎉</div>'}else{title.textContent=`⏳ 미제출 업체 (${notSub.length}곳)`;container.innerHTML=notSub.map(name=>`<span class="not-chip">${name}</span>`).join('')}}function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
