:root{--bg:#f7f3ec;--card:#fff;--primary:#7b3f1a;--gold:#f0d090;--gold2:#f7ead0;--text:#1f2328;--sub:#6b5b4a;--border:#e5d7c5;--success:#1e6e40;--err:#c0392b;--shadow:0 2px 12px rgba(0,0,0,.08);--radius:14px}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal-box{background:#fff;border-radius:var(--radius);padding:24px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.18)}

.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--sub);line-height:1}

.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){
  .top-bar{padding:14px 16px}
  .controls-bar,.summary-row{padding:12px 16px}
  .table-section,.not-submitted-section,.member-section{padding-left:16px;padding-right:16px}

  .current-date{min-width:130px;font-size:14px}
  .order-table th,.order-table td{padding:11px 10px}
  .members-btn{margin-left:0}
}

<!-- 로그인 -->
<div id="auth-screen">

<!-- 회원 수정 모달 -->
<div class="modal-overlay" id="member-modal" onclick="closeMemberModal(event)">

<div class="toast" id="toast"></div>

<script>
let currentDateStr = '';
let allUsers = {};

function getKST() { return new Date(new Date().getTime() + 9 * 60 * 60 * 1000); }
function dateStr(d) { return d.toISOString().split('T')[0]; }
function formatDateKR(dStr) {
  const [y,m,d] = dStr.split('-');
  const days = ['일','월','화','수','목','금','토'];
  const dt = new Date(`${dStr}T00:00:00+09:00`);
  return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일 (${days[dt.getDay()]})`;
}
function isWeekendDate(dStr) {
  const dt = new Date(`${dStr}T00:00:00+09:00`);
  return dt.getDay() === 0 || dt.getDay() === 6;
}
function formatTime(ts) {
  if (!ts) return '-';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
  return `${String(kst.getUTCHours()).padStart(2,'0')}:${String(kst.getUTCMinutes()).padStart(2,'0')}`;
}

// ── 인증 ──
auth.onAuthStateChanged(async (user) => {
  document.getElementById('loading-screen').style.display = 'none';
  const authScreen = document.getElementById('auth-screen');
  const mainScreen = document.getElementById('main-screen');
  if (user && ADMIN_EMAILS.includes(user.email)) {
    authScreen.classList.remove('active');
    mainScreen.classList.add('active');
    currentDateStr = dateStr(getKST());
    await loadAllUsers();
    updateDateLabel();
    loadOrders();
  } else if (user) {
    mainScreen.classList.remove('active');
    authScreen.classList.add('active');
    await auth.signOut();
    showToast('관리자 계정이 아닙니다.');
  } else {
    mainScreen.classList.remove('active');
    authScreen.classList.add('active');
  }
});

async function doAdminLogin() {
  const email = document.getElementById('admin-email').value.trim();
  const pw = document.getElementById('admin-pw').value;
  const errorEl = document.getElementById('login-error');
  errorEl.classList.remove('show');
  if (!ADMIN_EMAILS.includes(email) || pw !== ADMIN_PASSWORD) {
    errorEl.classList.add('show'); return;
  }
  try {
    await auth.signInWithEmailAndPassword(email, pw);
  } catch(e) { errorEl.classList.add('show'); }
}

function doAdminLogout() {
  auth.signOut();
  document.getElementById('main-screen').classList.remove('active');
  document.getElementById('auth-screen').classList.add('active');
}

// ── 유저 로드 ──
async function loadAllUsers() {
  allUsers = {};
  try {
    const snap = await db.collection('users').get();
    snap.forEach(doc => { allUsers[doc.id] = doc.data(); });
  } catch(e) { console.log('유저 로드 오류:', e); }
}

// ── 날짜 이동 ──
function changeDate(delta) {
  const d = new Date(currentDateStr + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  currentDateStr = dateStr(d);
  updateDateLabel();
  loadOrders();
}
function goToday() { currentDateStr = dateStr(getKST()); updateDateLabel(); loadOrders(); }
function updateDateLabel() {
  document.getElementById('current-date-label').textContent = formatDateKR(currentDateStr);
}

// ── 주문 로드 ──
async function loadOrders() {
  document.getElementById('order-tbody').innerHTML = '<tr class="no-order-row"><td colspan="6">불러오는 중...</td></tr>';
  document.getElementById('not-submitted-list').innerHTML = '';

  if (isWeekendDate(currentDateStr)) {
    document.getElementById('order-tbody').innerHTML = '<tr class="no-order-row"><td colspan="6">토·일은 월식 배송이 없습니다</td></tr>';
    ['sum-count','sum-lunch','sum-salad'].forEach((id,i) => {
      document.getElementById(id).innerHTML = '0<span class="summary-unit">' + ['곳','개','개'][i] + '</span>';
    });
    document.getElementById('not-sub-title').textContent = '🚚 토·일 배송 없음';
    document.getElementById('not-submitted-list').innerHTML = '<div class="no-not">토요일·일요일은 주문 확인 대상에서 제외됩니다.</div>';
    return;
  }

  try {
    const snap = await db.collection('orders').doc(currentDateStr).collection('items').get();
    const orders = [];
    snap.forEach(doc => orders.push({ uid: doc.id, ...doc.data() }));
    orders.sort((a, b) => (a.businessName || '').localeCompare(b.businessName || '', 'ko'));

    let totalLunch = 0, totalSalad = 0;
    const tbody = document.getElementById('order-tbody');

    if (orders.length === 0) {
      tbody.innerHTML = '<tr class="no-order-row"><td colspan="6">아직 주문이 없습니다</td></tr>';
    } else {
      tbody.innerHTML = '';
      orders.forEach((o, i) => {
        totalLunch += o.lunchCount || 0;
        totalSalad += o.saladCount || 0;
        const tr = document.createElement('tr');
        const noteHtml = o.note
          ? `<span class="note-badge" title="${o.note.replace(/"/g,'&quot;')}">${o.note}</span>`
          : '<span style="color:#ccc">-</span>';
        tr.innerHTML = `
          <td style="color:var(--sub);font-size:13px">${i + 1}</td>
          <td class="biz-name"><span class="dot"></span>${o.businessName || '-'}</td>
          <td class="qty-cell">${o.lunchCount ?? '-'}</td>
          <td class="qty-cell">${o.saladCount ?? '-'}</td>
          <td class="time-cell">${formatTime(o.submittedAt)}</td>
          <td class="note-cell">${noteHtml}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.getElementById('sum-count').innerHTML = `${orders.length}<span class="summary-unit">곳</span>`;
    document.getElementById('sum-lunch').innerHTML = `${totalLunch}<span class="summary-unit">개</span>`;
    document.getElementById('sum-salad').innerHTML = `${totalSalad}<span class="summary-unit">개</span>`;
    renderNotSubmitted(orders);
  } catch(e) {
    document.getElementById('order-tbody').innerHTML = '<tr class="no-order-row"><td colspan="6">불러오기 실패: ' + e.message + '</td></tr>';
  }
}

// ── 미제출 업체 ──
function renderNotSubmitted(submitted) {
  const submittedUids = new Set(submitted.map(o => o.uid));
  const notSub = Object.entries(allUsers)
    .filter(([uid]) => !submittedUids.has(uid))
    .map(([, u]) => u.businessName).filter(Boolean);
  const container = document.getElementById('not-submitted-list');
  const title = document.getElementById('not-sub-title');
  if (notSub.length === 0) {
    title.textContent = '✅ 모든 업체 제출 완료';
    container.innerHTML = '<div class="no-not">전체 업체가 주문을 완료했습니다 🎉</div>';
  } else {
    title.textContent = `⏳ 미제출 업체 (${notSub.length}곳)`;
    container.innerHTML = notSub.map(name => `<span class="not-chip">${name}</span>`).join('');
  }
}

// ── 회원 관리 ──
function toggleMemberSection() {
  const sec = document.getElementById('member-section');
  const isHidden = sec.style.display === 'none';
  sec.style.display = isHidden ? 'block' : 'none';
  if (isHidden) renderMembers();
}

function renderMembers() {
  const grid = document.getElementById('member-grid');
  const users = Object.entries(allUsers);
  if (users.length === 0) {
    grid.innerHTML = '<div style="color:var(--sub);font-size:14px;grid-column:1/-1">등록된 회원이 없습니다.</div>';
    return;
  }
  grid.innerHTML = users
    .sort((a, b) => (a[1].businessName || '').localeCompare(b[1].businessName || '', 'ko'))
    .map(([uid, u]) => `
      <div class="member-card" onclick="openMemberEdit('${uid}')">
        <div class="m-name">${u.businessName || '-'}</div>
        <div class="m-info">${u.phone || u.email || '-'}</div>
        <div class="m-info">도시락 ${u.defaultLunch ?? 2}개 · 샐러드 ${u.defaultSalad ?? 0}개</div>
        <div class="m-edit-hint">✏️ 수정하기</div>
      </div>
    `).join('');
}

function openMemberEdit(uid) {
  const u = allUsers[uid];
  if (!u) return;
  document.getElementById('edit-uid').value = uid;
  document.getElementById('edit-bizname').value = u.businessName || '';
  document.getElementById('edit-phone').value = u.phone || '';
  document.getElementById('edit-lunch').value = u.defaultLunch ?? 2;
  document.getElementById('edit-salad').value = u.defaultSalad ?? 0;
  document.getElementById('edit-error').classList.remove('show');
  document.getElementById('member-modal').classList.add('open');
}

function closeMemberModal(e) {
  if (!e || e.target === document.getElementById('member-modal')) {
    document.getElementById('member-modal').classList.remove('open');
  }
}

async function saveMember() {
  const uid = document.getElementById('edit-uid').value;
  const bizname = document.getElementById('edit-bizname').value.trim();
  const phone = document.getElementById('edit-phone').value.trim();
  const lunch = parseInt(document.getElementById('edit-lunch').value) || 0;
  const salad = parseInt(document.getElementById('edit-salad').value) || 0;
  if (!bizname) {
    const errEl = document.getElementById('edit-error');
    errEl.textContent = '업체명을 입력해주세요.';
    errEl.classList.add('show');
    return;
  }
  try {
    await db.collection('users').doc(uid).update({ businessName: bizname, phone, defaultLunch: lunch, defaultSalad: salad });
    allUsers[uid] = { ...allUsers[uid], businessName: bizname, phone, defaultLunch: lunch, defaultSalad: salad };
    closeMemberModal();
    renderMembers();
    showToast('✅ 회원정보가 저장되었습니다.');
  } catch(e) {
    const errEl = document.getElementById('edit-error');
    errEl.textContent = '저장 실패: ' + e.message;
    errEl.classList.add('show');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
