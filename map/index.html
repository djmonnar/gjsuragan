<div class="driver-map-app" id="app">

<div id="tw"></div>

<script>
const DAYS = ['일','월','화','수','목','금','토'];
const PRODUCTS = [
  { id:'A', label:'A세트' },
  { id:'B', label:'B세트' },
  { id:'C', label:'C세트' },
  { id:'pork_rib', label:'돼지 양념갈비' },
  { id:'beef_la', label:'양념 LA갈비' },
  { id:'beef_soup', label:'소고기무국' }
];
let custs = [];
let customersUnsub = null;

function todayStr(){
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}
function addDays(dateStr, d){
  const [y,m,day] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, day + d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function dow(ds){
  const [y,m,d] = ds.split('-').map(Number);
  return new Date(y, m-1, d).getDay();
}
function dateLabel(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return `${m}월 ${d}일 (${DAYS[dt.getDay()]})`;
}
function wasDeliveredOn(c, ds){
  return Array.isArray(c.deliveredDates) && c.deliveredDates.includes(ds);
}
function isDelivSub(c, ds){
  if (c.orderType !== 'sub') return false;
  if (wasDeliveredOn(c, ds)) return true;
  if (c.status !== 'active' || Number(c.remain || 0) <= 0) return false;
  if (c.startDate && ds < c.startDate) return false;
  const d = dow(ds);
  if (Array.isArray(c.cookDays) && c.cookDays.length) return c.cookDays.includes(d);
  const cookFromArrive = (c.arriveDays || []).map(a => a === 0 ? 6 : a - 1);
  return cookFromArrive.includes(d);
}
function isDelivOnce(c, ds){
  if (c.orderType !== 'once') return false;
  if (wasDeliveredOn(c, ds)) return true;
  if (c.status !== 'active' || Number(c.remain || 0) <= 0) return false;
  if (c.startDate && ds < c.startDate) return false;
  return c.onceDate === ds;
}
function isDeliv(c, ds){
  return isDelivSub(c, ds) || isDelivOnce(c, ds);
}
function listFor(ds){
  return custs.filter(c => isDeliv(c, ds));
}
function productLabel(id){
  return (PRODUCTS.find(p => p.id === id)?.label) || id || '';
}
function productBadgeClass(id){
  if (id === 'A') return 'ba';
  if (id === 'B') return 'bb';
  if (id === 'C') return 'bc';
  if (id === 'pork_rib') return 'b-pork';
  if (id === 'beef_la' || id === 'beef_soup') return 'b-beef';
  return 'b-pause';
}
function deliveryProductBadgeHtml(c){
  const id = c.productId || c.set || '';
  if (!id) return '';
  return `<span class="badge ${productBadgeClass(id)}">${productLabel(id)}</span>`;
}
function lastBoxDeliveryBadge(c){
  if (c?.isDirect === true && Number(c.remain || 0) === 1) {
    return '<span class="badge" style="background:#fff7ed;color:#9a3412;border-color:#fed7aa;">박스</span>';
  }
  return '';
}
function scheduleDisp(c){
  return c.scheduleName || c.schedule || '';
}
function toast(msg, type=''){
  const wrap = document.getElementById('tw');
  if (!wrap) {
    alert(msg);
    return;
  }
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}
async function markDone(id, dateStr){
  const c = custs.find(x => x.id === id);
  if (!c) return;
  const t = dateStr || todayStr();
  if ((c.deliveredDates || []).includes(t)) {
    toast('이미 완료 처리된 날짜입니다.', 'er');
    return;
  }
  const remain = Number(c.remain || 0);
  if (remain <= 0) {
    toast('이미 배송 완료된 주문입니다.', 'er');
    return;
  }
  const nextRemain = remain - 1;
  await window.__DB.collection('customers').doc(id).update({
    remain: nextRemain,
    deliveredDates: [...(c.deliveredDates || []), t],
    status: nextRemain === 0 ? 'end' : c.status
  });
  toast(`${c.name || '고객'} 배송완료`, 'ok');
}
async function undoMarkDone(id, dateStr){
  const c = custs.find(x => x.id === id);
  if (!c) return;
  if (!confirm(`${c.name || '고객'} [${dateStr}] 배송완료를 취소할까요?`)) return;
  const dates = (c.deliveredDates || []).filter(d => d !== dateStr);
  await window.__DB.collection('customers').doc(id).update({
    remain: Number(c.remain || 0) + 1,
    deliveredDates: dates,
    status: c.status === 'end' ? 'active' : c.status
  });
  toast(`${c.name || '고객'} 배송완료 취소`, 'ok');
}
function showAppScreen(){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  const routeDate = document.getElementById('routeDate');
  if (routeDate && !routeDate.value) routeDate.value = todayStr();
  initFirestore();
}
function initFirestore(){
  if (customersUnsub || !window.__DB) return;
  customersUnsub = window.__DB.collection('customers').where('isDirect', '==', true).onSnapshot(
    snap => {
      custs = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      renderRouteMap(false, false);
      document.getElementById('loading').style.display = 'none';
    },
    err => {
      toast('배송 목록을 불러오지 못했습니다: ' + err.message, 'er');
      document.getElementById('routeMapStatus').textContent = '배송 목록 로드 실패: ' + err.message;
      document.getElementById('loading').style.display = 'none';
    }
  );
}
function stopFirestore(){
  if (typeof customersUnsub === 'function') customersUnsub();
  customersUnsub = null;
  custs = [];
}
async function startDriverMap(){
  if (!window.__AUTH.currentUser) {
    await window.__AUTH.signInAnonymously();
  }
  showAppScreen();
}
window.addEventListener('DOMContentLoaded', () => {
  const theme = localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', theme);
  startDriverMap().catch(err => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('routeMapStatus').textContent = '배송지도 준비 실패: ' + (err.message || err);
    toast('배송지도 준비 실패: ' + (err.message || err), 'er');
  });
});
</script>
<script src="../assets/js/route-map.js?v=20260626-roundtrip1" defer></script>
