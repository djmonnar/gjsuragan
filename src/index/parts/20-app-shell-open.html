  <div class="header-left">
    <button class="shell-menu-btn" type="button" title="메뉴" aria-label="메뉴">&#9776;</button>
    <div class="mobile-brand"><img class="logo-mark-img" src="assets/img/suragan-mark.png" alt=""><span>궁중수라간</span></div>
    <span class="hdate" id="hDate"></span>

    <button class="btn btn-g sm header-logout" title="로그아웃" aria-label="로그아웃" onclick="doLogout()">로그아웃</button>
