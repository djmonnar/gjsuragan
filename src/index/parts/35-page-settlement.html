
<!-- ══════════ 주문 정산 ══════════ -->
<div class="page" id="page-settlement">
  <div class="sh sales-toolbar">
    <div>
      <div class="st"><div class="std"></div>주문 매출 정산</div>
      <div class="sales-toolbar-note">배송 횟수가 아닌 주문일·주문번호 기준 매출입니다.</div>
    </div>
    <div class="sales-toolbar-controls">
      <input type="month" class="inp inp-sm" id="salesMonth" onchange="renderOrderSettlement()">
      <button class="btn btn-g sm" onclick="resetOrderSettlementMonth()">이번 달</button>
      <select class="inp inp-sm" id="salesSource" onchange="renderOrderSettlement()">
        <option value="">전체 유입</option>
        <option value="imweb">아임웹</option>
        <option value="manual">전화·카톡</option>
        <option value="excel">엑셀</option>
        <option value="other">기타</option>
      </select>
      <select class="inp inp-sm" id="salesAmountState" onchange="renderOrderSettlement()">
        <option value="">전체 금액 상태</option>
        <option value="known">금액 입력</option>
        <option value="missing">확인 필요</option>
      </select>
      <select class="inp inp-sm" id="salesSort" onchange="renderOrderSettlement()">
        <option value="date">최신 주문순</option>
        <option value="amount">금액 높은순</option>
        <option value="name">고객명순</option>
      </select>
      <input type="text" class="inp inp-sm" id="salesQuery" placeholder="고객명 · 주문번호 · 상품" oninput="renderOrderSettlement()">
      <button class="btn btn-g sm" onclick="resetOrderSettlementFilters()">필터 초기화</button>
    </div>
  </div>

  <div class="ibox sales-policy-note">
    <b>합계 기준:</b> 같은 주문번호의 상품이 여러 문서로 나뉘어도 한 번만 계산합니다. 금액이 없거나 같은 주문번호에 서로 다른 금액이 있으면 총매출에서 제외하고 확인 필요로 표시합니다.
  </div>

  <div class="sales-summary-grid" id="salesSummary"></div>

  <div class="sh sales-list-head">
    <div class="st"><div class="std"></div>월별 주문 내역</div>
    <span id="salesCount" class="sales-count"></span>
  </div>
  <div class="card sales-table-card"><div class="tw">
    <table>
      <thead><tr><th>주문일</th><th>유입</th><th>고객명</th><th>상품</th><th>주문번호</th><th>상태</th><th>주문금액</th><th>관리</th></tr></thead>
      <tbody id="salesList"></tbody>
    </table>
  </div></div>
</div>
