
<!-- ══════════ 고객 관리 ══════════ -->
<div class="page" id="page-customers">
  <div class="sh">
    <div class="st"><div class="std"></div>고객 목록</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <input type="text" class="inp inp-sm" placeholder="이름 · 연락처 · 주소 · 주문번호" id="srchQ" oninput="renderCust()" style="width:220px;">
      <select class="inp inp-sm" id="srchSet" onchange="renderCust()" style="width:110px;">
        <option value="">전체 세트</option>
        <option value="A">A세트</option>
        <option value="B">B세트</option>
        <option value="C">C세트</option>
        <option value="pork_rib">돼지양념갈비</option>
        <option value="beef_la">LA갈비</option>
        <option value="beef_soup">소고기무국</option>
      </select>
      <select class="inp inp-sm" id="srchType" onchange="renderCust()" style="width:110px;"><option value="">전체 유형</option><option value="sub">정기배송</option><option value="once">선택주문</option></select>
      <select class="inp inp-sm" id="srchSt" onchange="renderCust()" style="width:110px;"><option value="">전체 상태</option><option value="active">진행 중</option><option value="pause">일시정지</option><option value="end">종료</option></select>
      <select class="inp inp-sm" id="srchDirect" onchange="renderCust()" style="width:110px;"><option value="">전체 배송</option><option value="1">직배송</option><option value="0">택배배송</option></select>
      <select class="inp inp-sm" id="srchRemain" onchange="renderCust()" style="width:110px;">
        <option value="">전체 잔여</option>
        <option value="remain">잔여 있음</option>
        <option value="done">잔여 없음</option>
      </select>
      <select class="inp inp-sm" id="srchSort" onchange="renderCust()" style="width:100px;">
        <option value="recent">최신순</option>
        <option value="name">가나다순</option>
        <option value="remain">잔여순</option>
      </select>
      <button class="btn btn-p sm" onclick="openM('addM')">＋ 신규 등록</button>
      <button class="btn btn-g sm" onclick="openImwebPasteTool()">아임웹 붙여넣기</button>
      <button class="btn btn-g sm" onclick="exportCSV()" title="전체 고객 CSV 백업">⬇ CSV 백업</button>
      <button class="btn btn-g sm" onclick="exportPhoneExcel()" title="전체 고객 전화번호 엑셀 다운로드">📞 전화번호 엑셀</button>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 300px;gap:16px;" class="cust-grid">
    <div class="card" style="overflow:auto;max-height:calc(100vh - 220px);">
      <table>
        <thead><tr><th>고객명</th><th>연락처</th><th>세트</th><th>유형</th><th>배송일정</th><th>배송</th><th>잔여</th><th>상태</th><th></th></tr></thead>
        <tbody id="custList"></tbody>
      </table>
    </div>
    <div id="custDetail">
      <div class="dp"><div style="text-align:center;padding:36px 16px;color:var(--text3);"><div style="font-size:28px;margin-bottom:8px;">👤</div><div style="font-size:12px;">고객을 클릭하면<br>상세정보가 표시됩니다</div></div></div>
    </div>
  </div>
</div>
