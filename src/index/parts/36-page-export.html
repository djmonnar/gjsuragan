
<!-- ══════════ 택배 전달 ══════════ -->
<div class="page" id="page-export">
  <div class="g2">
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div class="sh"><div class="st"><div class="std"></div>조건 선택</div></div>
      <div class="card" style="padding:18px;">
        <div class="fg">
          <div class="fgrp"><div class="flab">배송일</div><input type="date" class="inp" id="expDate"></div>
          <div class="fgrp"><div class="flab">세트</div><select class="inp" id="expSet"><option value="">전체</option><option value="A">A세트</option><option value="B">B세트</option><option value="C">C세트</option></select></div>
          <div class="fgrp"><div class="flab">유형</div><select class="inp" id="expType"><option value="">전체</option><option value="sub">정기배송</option><option value="once">선택주문</option></select></div>
        </div>
        <button class="btn btn-p" style="width:100%;margin-top:14px;" onclick="genExport()">목록 생성</button>
      </div>
      <div class="card" style="padding:18px;">
        <div class="sh" style="margin-bottom:10px;">
          <div style="font-size:13px;font-weight:600;">발송 목록 (텍스트)</div>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-g sm" onclick="copyExp()">복사</button>
            <button class="btn btn-s sm" onclick="dlExp()">⬇ 저장</button>
          </div>
        </div>
        <div class="exptxt" id="expTxt">날짜를 선택 후 목록 생성을 눌러주세요.</div>
      </div>
    </div>
    <div>
      <div class="sh"><div class="st"><div class="std"></div>배송 미리보기</div></div>
      <div class="card" style="overflow:auto;max-height:calc(100vh - 180px);"><div class="tw">
        <table><thead><tr><th>#</th><th>수취인</th><th>연락처</th><th>주소</th><th>세트</th><th>메모</th></tr></thead>
        <tbody id="expTbl"></tbody></table>
      </div></div>
    </div>
  </div>
</div>
