<style>
:root{--bg:#f7efe2;--card:#fff;--primary:#7b3f1a;--primary2:#914a20;--gold:#c8922a;--text:#1f2328;--sub:#6b7280;--border:#ead8bd;--danger:#c0392b;--success:#2e7d52;--shadow:0 12px 36px rgba(74,38,14,.14)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:linear-gradient(180deg,#7b3f1a 0,#7b3f1a 230px,#f7efe2 230px);color:var(--text);min-height:100vh}
.page{width:min(100%,480px);margin:0 auto;padding:28px 18px 36px}
.top{color:#f0d090;text-align:center;padding:18px 0 20px}
.brand{font-size:28px;font-weight:800;letter-spacing:.2px}
.sub{font-size:13px;color:rgba(240,208,144,.72);margin-top:4px}
.hero{background:#fff;border-radius:8px;overflow:hidden;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.4)}
.hero img{display:block;width:100%;height:auto}
.panel{background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);padding:18px;margin-top:16px}
.panel-title{font-size:18px;font-weight:900;color:var(--primary);margin-bottom:6px}
.panel-copy{font-size:13px;color:var(--sub);line-height:1.55;margin-bottom:16px}
.field{margin-bottom:13px}
.label{display:block;font-size:14px;font-weight:800;color:#4b5563;margin-bottom:6px}
.input,.textarea{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;background:#f8fafc;padding:13px 14px;font:inherit;font-size:16px;color:var(--text)}
.textarea{min-height:92px;resize:vertical;line-height:1.5}
.input:focus,.textarea:focus{outline:none;border-color:var(--primary);background:#fff}
.field.has-error .label,.field.has-error .label div{color:var(--danger)}
.field.has-error .input,.field.has-error .textarea,.field.has-error .menu-builder,.field.has-error .time-options,.field.has-error .pay-row,.field.has-error .consent{border-color:var(--danger)!important;background:#fff7f6!important;box-shadow:0 0 0 3px rgba(192,57,43,.1)}
.field-error{display:none;margin-top:6px;color:var(--danger);font-size:12px;font-weight:800;line-height:1.45}
.field.has-error .field-error{display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.menu-builder{border:1px solid var(--border);border-radius:8px;background:#fffaf5;padding:12px;margin-bottom:12px}
.menu-builder-grid{display:grid;grid-template-columns:1fr;gap:8px}
.menu-add{border:1px solid var(--primary);background:#fff;color:var(--primary);border-radius:8px;padding:12px;font:inherit;font-weight:900;cursor:pointer;width:100%;margin-top:8px}
.menu-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.menu-item{display:flex;justify-content:space-between;gap:8px;align-items:center;background:#fff;border:1px solid #ead8bd;border-radius:8px;padding:10px}
.menu-item-main{font-size:13px;line-height:1.45}
.menu-item-main strong{display:block;color:var(--primary);font-size:14px}
.menu-remove{border:0;background:#fdecea;color:var(--danger);border-radius:6px;padding:7px 9px;font:inherit;font-size:12px;font-weight:900;cursor:pointer;flex:0 0 auto}
.time-options{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.time-btn{border:1.5px solid #e5e7eb;border-radius:8px;background:#fff;padding:11px 8px;font:inherit;font-size:14px;font-weight:900;color:#4b5563;cursor:pointer}
.time-btn.active{border-color:var(--primary);background:#fff4e4;color:var(--primary)}
.time-custom{display:none;margin-top:8px}
.pay-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pay{display:flex;align-items:center;justify-content:center;gap:6px;border:1.5px solid #e5e7eb;border-radius:8px;background:#fff;padding:12px 8px;font-size:14px;font-weight:800;color:#4b5563}
.pay input{width:18px;height:18px;accent-color:var(--primary)}
.consent{display:flex;align-items:flex-start;gap:9px;border:1.5px solid #e5e7eb;border-radius:8px;background:#fff;padding:11px 12px;font-size:12px;font-weight:700;line-height:1.5;color:#4b5563}
.consent input{width:18px;height:18px;flex:0 0 18px;margin-top:1px;accent-color:var(--primary)}
.bot-field{position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden}
.submit{width:100%;border:0;border-radius:8px;background:var(--primary);color:#fff;padding:15px;font:inherit;font-size:17px;font-weight:900;cursor:pointer;margin-top:4px}
.submit:disabled{opacity:.65;cursor:default}
.back{display:block;text-align:center;color:var(--primary);font-size:13px;font-weight:800;margin-top:14px;text-decoration:none}
.msg{display:none;border-radius:8px;padding:12px 14px;margin-top:12px;font-size:14px;line-height:1.5}
.msg.ok{display:block;background:#e8f5e9;color:var(--success)}
.msg.err{display:block;background:#fdecea;color:var(--danger)}
.msg-code{display:block;margin-top:7px;font-size:12px;font-weight:900;letter-spacing:.02em}
.required{color:var(--danger)}
@media(max-width:480px){.grid2{grid-template-columns:1fr}.time-options{grid-template-columns:repeat(3,1fr)}}
@media(max-width:390px){.page{padding-left:14px;padding-right:14px}.pay-row{grid-template-columns:1fr}.time-options{grid-template-columns:repeat(2,1fr)}.brand{font-size:25px}.panel{padding:16px}}
</style>
</head>
<body>
<main class="page">
  <header class="top">
    <div class="brand">궁중수라간</div>
    <div class="sub">행사도시락 비회원 주문</div>
  </header>

  <section class="hero">
    <img src="./assets/img/event-menu.jpg" alt="프리미엄 행사도시락 메뉴판">
  </section>

  <section class="panel">
    <div class="panel-title">행사도시락 주문</div>
    <div class="panel-copy">상담 확인 후 주문이 확정됩니다. 메뉴명과 수량을 함께 적어주세요.</div>

    <form id="event-order-form">
      <div class="bot-field" aria-hidden="true">
        <label for="companyWebsite">웹사이트</label>
        <input id="companyWebsite" name="companyWebsite" tabindex="-1" autocomplete="off">
      </div>
      <div class="field" data-field="businessName">
        <label class="label" for="businessName">상호명 <span class="required">*</span></label>
        <input class="input" id="businessName" maxlength="80" placeholder="예) 진주OO병원">
        <div class="field-error"></div>
      </div>
      <div class="field" data-field="contactPhone">
        <label class="label" for="contactPhone">연락처 <span class="required">*</span></label>
        <input class="input" type="tel" id="contactPhone" maxlength="24" placeholder="예) 010-0000-0000">
        <div class="field-error"></div>
      </div>
      <div class="field" data-field="place">
        <label class="label" for="place">장소 <span class="required">*</span></label>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">
          <input class="input" id="place" maxlength="160" placeholder="주소 찾기 버튼으로 입력하세요" readonly style="flex:1;background:#f0f0f0;cursor:default;margin-bottom:0">
          <button type="button" onclick="openPlaceSearch()" style="white-space:nowrap;border:1.5px solid var(--primary);background:#fff;color:var(--primary);border-radius:8px;padding:13px 12px;font:inherit;font-size:14px;font-weight:800;cursor:pointer;flex-shrink:0">🔍 주소 찾기</button>
        </div>
        <input class="input" id="placeDetail" maxlength="160" placeholder="상세주소 (건물명, 층, 호수 등)">
        <div class="field-error"></div>
      </div>
      <div class="grid2">
        <div class="field" data-field="eventDate">
          <label class="label" for="eventDate">날짜 <span class="required">*</span></label>
          <input class="input" type="date" id="eventDate">
          <div class="field-error"></div>
        </div>
        <div class="field" data-field="eventTime">
          <label class="label">수령 희망 시간 <span class="required">*</span></label>
          <div class="time-options" id="timeOptions">
            <button class="time-btn" type="button" data-time="10:30">10:30</button>
            <button class="time-btn" type="button" data-time="11:00">11:00</button>
            <button class="time-btn" type="button" data-time="11:30">11:30</button>
            <button class="time-btn" type="button" data-time="12:00">12:00</button>
            <button class="time-btn" type="button" data-time="12:30">12:30</button>
            <button class="time-btn" type="button" data-time="custom">기타</button>
          </div>
          <input class="input time-custom" id="customTime" maxlength="40" placeholder="예) 오전 9시, 오후 3시 30분">
          <div class="field-error"></div>
        </div>
      </div>
      <div class="field" data-field="items">
        <div class="label">도시락메뉴/수량 <span class="required">*</span></div>
        <div class="menu-builder">
          <div class="menu-builder-grid">
            <select class="input" id="menuCategory"></select>
            <select class="input" id="menuName"></select>
            <input class="input" type="number" id="menuQty" min="1" max="999" placeholder="수량">
          </div>
          <button class="menu-add" type="button" onclick="addMenuItem()">+ 메뉴 추가</button>
          <div class="menu-list" id="menuList"></div>
        </div>
        <div class="field-error"></div>
      </div>
      <div class="field">
        <label class="label" for="requestNote">요청사항</label>
        <textarea class="textarea" id="requestNote" maxlength="500" placeholder="포장, 알레르기, 수저 필요 여부 등"></textarea>
      </div>
      <div class="field" data-field="paymentMethod">
        <div class="label">결제 <span class="required">*</span></div>
        <div class="pay-row">
          <label class="pay"><input type="radio" name="paymentMethod" id="payCash" value="cash"> 현금</label>
          <label class="pay"><input type="radio" name="paymentMethod" id="payTransfer" value="transfer"> 이체</label>
          <label class="pay"><input type="radio" name="paymentMethod" id="payCard" value="card"> 카드계산</label>
        </div>
        <div class="field-error"></div>
      </div>
      <div class="field" data-field="privacyConsent">
      <label class="consent" for="privacyConsent">
        <input type="checkbox" id="privacyConsent">
        <span>주문 확인과 배송 상담을 위해 상호명, 연락처, 장소, 주문 내용을 수집·이용하는 데 동의합니다.</span>
      </label>
      <div class="field-error"></div>
      </div>
      <button class="submit" id="submitBtn" type="submit">주문 접수하기</button>
      <div class="msg" id="formMsg"></div>
    </form>
    <a class="back" href="./customer.html">월식 주문앱으로 돌아가기</a>
  </section>
</main>

<script>
const form = document.getElementById('event-order-form');
const msg = document.getElementById('formMsg');
const btn = document.getElementById('submitBtn');
const EVENT_MENUS = [
  { category: '한상 도시락', name: '제육 한상 (간장, 양념)', price: 9000 },
  { category: '한상 도시락', name: '순살닭구이 한상', price: 9500 },
  { category: '수라상 도시락', name: '양념닭구이&떡갈비', price: 13900 },
  { category: '수라상 도시락', name: '김치제육&떡갈비', price: 14900 },
  { category: '수라상 도시락', name: '간장제육&양념닭구이', price: 15900 },
  { category: 'VIP 일품 도시락', name: '직화제육&간장제육 한정식', price: 17900 },
  { category: 'VIP 일품 도시락', name: '소불고기 한정식', price: 18900 },
  { category: 'VIP 일품 도시락', name: '소불고기&생선구이 한정식', price: 19900 },
  { category: 'VIP 일품 도시락', name: '프리미엄 장어구이&전복', price: 27900 },
  { category: 'VIP 일품 도시락', name: '프리미엄 LA갈비&연어스테이크', price: 29900 },
  { category: 'VIP 일품 도시락', name: '프리미엄 VIP 도시락', price: 33900 }
];
let selectedTime = '';
let orderItems = [];

function value(id) {
  return document.getElementById(id).value.trim();
}

function setMsg(text, type) {
  msg.textContent = text;
  msg.className = `msg ${type}`;
}

function escapeHtml(text) {
  return String(text ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}

function clearValidationErrors() {
  document.querySelectorAll('.field.has-error').forEach(field => {
    field.classList.remove('has-error');
    const error = field.querySelector('.field-error');
    if (error) error.textContent = '';
  });
  if (msg.classList.contains('err')) {
    msg.textContent = '';
    msg.className = 'msg';
  }
}

function markFieldError(fieldName, message) {
  const field = document.querySelector(`[data-field="${fieldName}"]`);
  if (!field) return null;
  field.classList.add('has-error');
  const error = field.querySelector('.field-error');
  if (error) error.textContent = message;
  return field;
}

function showValidationErrors(errors) {
  clearValidationErrors();
  const fields = errors.map(error => markFieldError(error.field, error.message)).filter(Boolean);
  const codes = errors.map(error => error.code).join(', ');
  const listHtml = errors.map(error => `<li>${escapeHtml(error.label)}: ${escapeHtml(error.message)}</li>`).join('');
  msg.innerHTML = `필수 항목을 확인해주세요.<ul style="margin:8px 0 0 18px;padding:0">${listHtml}</ul><span class="msg-code">오류코드: ${escapeHtml(codes)}</span>`;
  msg.className = 'msg err';
  const first = fields[0];
  if (first) {
    first.scrollIntoView({ behavior: 'smooth', block: 'center' });
    setTimeout(() => {
      const focusTarget = first.querySelector('input:not([type="radio"]):not([type="checkbox"]), textarea, select, button');
      focusTarget?.focus?.({ preventScroll: true });
    }, 350);
  }
}

function validatePayload(payload, paymentMethod) {
  const errors = [];
  if (!payload.businessName) errors.push({ field:'businessName', code:'E_REQUIRED_BUSINESS_NAME', label:'상호명', message:'상호명을 입력해주세요.' });
  if (!payload.contactPhone) {
    errors.push({ field:'contactPhone', code:'E_REQUIRED_CONTACT_PHONE', label:'연락처', message:'연락처를 입력해주세요.' });
  } else if (!/^0[0-9\-\s]{7,20}$/.test(payload.contactPhone)) {
    errors.push({ field:'contactPhone', code:'E_INVALID_CONTACT_PHONE', label:'연락처', message:'연락처 형식을 확인해주세요.' });
  }
  if (!payload.place) errors.push({ field:'place', code:'E_REQUIRED_PLACE', label:'장소', message:'주소 찾기 버튼으로 장소를 입력해주세요.' });
  if (!payload.eventDate) errors.push({ field:'eventDate', code:'E_REQUIRED_EVENT_DATE', label:'날짜', message:'행사 날짜를 선택해주세요.' });
  if (!selectedTime) {
    errors.push({ field:'eventTime', code:'E_REQUIRED_EVENT_TIME', label:'수령 희망 시간', message:'수령 희망 시간을 선택해주세요.' });
  } else if (selectedTime === 'custom' && !value('customTime')) {
    errors.push({ field:'eventTime', code:'E_REQUIRED_CUSTOM_TIME', label:'수령 희망 시간', message:'기타 시간을 직접 입력해주세요.' });
  }
  if (!orderItems.length) errors.push({ field:'items', code:'E_REQUIRED_ITEMS', label:'도시락메뉴/수량', message:'메뉴와 수량을 선택한 뒤 + 메뉴 추가를 눌러주세요.' });
  if (!paymentMethod) errors.push({ field:'paymentMethod', code:'E_REQUIRED_PAYMENT', label:'결제', message:'결제 방법을 하나 선택해주세요.' });
  if (!payload.privacyConsent) errors.push({ field:'privacyConsent', code:'E_REQUIRED_PRIVACY_CONSENT', label:'개인정보 동의', message:'개인정보 수집·이용에 동의해주세요.' });
  return errors;
}

function money(value) {
  return Number(value || 0).toLocaleString('ko-KR') + '원';
}

function initMenus() {
  const cat = document.getElementById('menuCategory');
  const categories = [...new Set(EVENT_MENUS.map(item => item.category))];
  cat.innerHTML = categories.map(name => `<option value="${name}">${name}</option>`).join('');
  cat.addEventListener('change', renderMenuOptions);
  renderMenuOptions();
}

function renderMenuOptions() {
  const category = value('menuCategory');
  const menu = document.getElementById('menuName');
  menu.innerHTML = EVENT_MENUS
    .filter(item => item.category === category)
    .map(item => `<option value="${item.name}">${item.name} (${money(item.price)})</option>`)
    .join('');
}

function renderMenuList() {
  const list = document.getElementById('menuList');
  if (!orderItems.length) {
    list.innerHTML = '<div style="font-size:13px;color:#8a6a4f;text-align:center;padding:6px">추가된 메뉴가 없습니다.</div>';
    return;
  }
  list.innerHTML = orderItems.map((item, idx) => `
    <div class="menu-item">
      <div class="menu-item-main"><strong>${item.name}</strong>${item.category} · ${item.qty}개 · ${money(item.price)}</div>
      <button class="menu-remove" type="button" onclick="removeMenuItem(${idx})">삭제</button>
    </div>
  `).join('');
}

function addMenuItem() {
  const category = value('menuCategory');
  const name = value('menuName');
  const qty = parseInt(value('menuQty'), 10) || 0;
  const menu = EVENT_MENUS.find(item => item.category === category && item.name === name);
  clearValidationErrors();
  if (!menu || qty <= 0) {
    showValidationErrors([{ field:'items', code:'E_INVALID_MENU_QTY', label:'도시락메뉴/수량', message:'메뉴를 선택하고 수량을 1개 이상 입력해주세요.' }]);
    return;
  }
  orderItems.push({ category, name, qty, price: menu.price });
  document.getElementById('menuQty').value = '';
  setMsg('', '');
  renderMenuList();
}

function removeMenuItem(index) {
  orderItems.splice(index, 1);
  renderMenuList();
}

function menuSummary() {
  return orderItems.map(item => `${item.name} ${item.qty}개`).join(', ');
}

function initTimeOptions() {
  document.querySelectorAll('.time-btn').forEach(button => {
    button.addEventListener('click', () => {
      clearValidationErrors();
      document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
      button.classList.add('active');
      selectedTime = button.dataset.time;
      document.getElementById('customTime').style.display = selectedTime === 'custom' ? 'block' : 'none';
    });
  });
}

function initValidationReset() {
  form.querySelectorAll('input, textarea, select').forEach(el => {
    el.addEventListener('input', clearValidationErrors);
    el.addEventListener('change', clearValidationErrors);
  });
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearValidationErrors();
  const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked')?.value || '';
  const paymentCash = paymentMethod === 'cash';
  const paymentTransfer = paymentMethod === 'transfer';
  const paymentCard = paymentMethod === 'card';
  const payload = {
    businessName: value('businessName'),
    contactPhone: value('contactPhone'),
    place: value('place'),
    placeDetail: value('placeDetail'),
    eventDate: value('eventDate'),
    eventTime: selectedTime === 'custom' ? value('customTime') : selectedTime,
    eventTimeType: selectedTime === 'custom' ? 'custom' : 'preset',
    menuText: menuSummary(),
    items: orderItems,
    requestNote: value('requestNote'),
    paymentCash,
    paymentTransfer,
    paymentCard,
    status: 'new',
    source: 'publicEventPage',
    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    privacyConsent: document.getElementById('privacyConsent').checked,
    companyWebsite: value('companyWebsite')
  };
  if (payload.companyWebsite) {
    setMsg('접수에 실패했습니다. 잠시 후 다시 시도해주세요.', 'err');
    return;
  }
  const validationErrors = validatePayload(payload, paymentMethod);
  if (validationErrors.length) {
    showValidationErrors(validationErrors);
    return;
  }
  btn.disabled = true;
  btn.textContent = '접수 중...';
  try {
    await db.collection('eventOrders').add(payload);
    form.reset();
    selectedTime = '';
    orderItems = [];
    document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('customTime').style.display = 'none';
    renderMenuList();
    setMsg('행사도시락 주문이 접수되었습니다. 확인 후 연락드리겠습니다.', 'ok');
  } catch (err) {
    console.error(err);
    setMsg('접수에 실패했습니다. 잠시 후 다시 시도해주세요.', 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '주문 접수하기';
  }
});

function openPlaceSearch() {
  function run() {
    new daum.Postcode({
      oncomplete(data) {
        document.getElementById('place').value = data.roadAddress || data.jibunAddress;
        clearValidationErrors();
        const detail = document.getElementById('placeDetail');
        if (detail) { detail.value = ''; detail.focus(); }
      }
    }).open();
  }
  if (window.daum?.Postcode) { run(); return; }
  const s = document.createElement('script');
  s.src = '//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js';
  s.onload = run;
  document.head.appendChild(s);
}

initMenus();
initTimeOptions();
initValidationReset();
renderMenuList();
</script>
</body>
</html>
