<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>궁중수라간 행사도시락 주문</title>
<meta name="theme-color" content="#7B3F1A">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCWXHJfMLW2Cf7pjI2u6X5QVKeGW6oC_3A",
    authDomain: "gjsuragan-60505.firebaseapp.com",
    projectId: "gjsuragan-60505",
    storageBucket: "gjsuragan-60505.firebasestorage.app",
    messagingSenderId: "1009198450175",
    appId: "1:1009198450175:web:4a55da7c2092dba42613ca"
  };
  const app = firebase.initializeApp(firebaseConfig, 'gjsuragan-event-order');
  const db = app.firestore();
</script>
<style>
:root{--bg:#f7efe2;--card:#fff;--primary:#7b3f1a;--primary2:#914a20;--gold:#c8922a;--text:#1f2328;--sub:#6b7280;--border:#ead8bd;--danger:#c0392b;--success:#2e7d52;--shadow:0 12px 36px rgba(74,38,14,.14)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:linear-gradient(180deg,#7b3f1a 0,#7b3f1a 230px,#f7efe2 230px);color:var(--text);min-height:100vh}
.page{width:min(100%,480px);margin:0 auto;padding:28px 18px 36px}
.top{color:#f0d090;text-align:center;padding:18px 0 20px}
.brand{font-size:28px;font-weight:800;letter-spacing:.2px}
.sub{font-size:13px;color:rgba(240,208,144,.72);margin-top:4px}
.hero{background:#fff;border-radius:8px;overflow:hidden;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.4)}
.hero img{display:block;width:100%;height:auto}
.panel{background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);padding:18px;margin-top:16px}
.panel-title{font-size:18px;font-weight:900;color:var(--primary);margin-bottom:6px}
.panel-copy{font-size:13px;color:var(--sub);line-height:1.55;margin-bottom:16px}
.field{margin-bottom:13px}
.label{display:block;font-size:14px;font-weight:800;color:#4b5563;margin-bottom:6px}
.input,.textarea{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;background:#f8fafc;padding:13px 14px;font:inherit;font-size:16px;color:var(--text)}
.textarea{min-height:92px;resize:vertical;line-height:1.5}
.input:focus,.textarea:focus{outline:none;border-color:var(--primary);background:#fff}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pay-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pay{display:flex;align-items:center;justify-content:center;gap:6px;border:1.5px solid #e5e7eb;border-radius:8px;background:#fff;padding:12px 8px;font-size:14px;font-weight:800;color:#4b5563}
.pay input{width:18px;height:18px;accent-color:var(--primary)}
.submit{width:100%;border:0;border-radius:8px;background:var(--primary);color:#fff;padding:15px;font:inherit;font-size:17px;font-weight:900;cursor:pointer;margin-top:4px}
.submit:disabled{opacity:.65;cursor:default}
.back{display:block;text-align:center;color:var(--primary);font-size:13px;font-weight:800;margin-top:14px;text-decoration:none}
.msg{display:none;border-radius:8px;padding:12px 14px;margin-top:12px;font-size:14px;line-height:1.5}
.msg.ok{display:block;background:#e8f5e9;color:var(--success)}
.msg.err{display:block;background:#fdecea;color:var(--danger)}
.required{color:var(--danger)}
@media(max-width:390px){.page{padding-left:14px;padding-right:14px}.grid2,.pay-row{grid-template-columns:1fr}.brand{font-size:25px}.panel{padding:16px}}
</style>
</head>
<body>
<main class="page">
  <header class="top">
    <div class="brand">궁중수라간</div>
    <div class="sub">행사도시락 비회원 주문</div>
  </header>

  <section class="hero">
    <img src="./assets/img/event-menu.jpg" alt="프리미엄 행사도시락 메뉴판">
  </section>

  <section class="panel">
    <div class="panel-title">행사도시락 주문</div>
    <div class="panel-copy">상담 확인 후 주문이 확정됩니다. 메뉴명과 수량을 함께 적어주세요.</div>

    <form id="event-order-form">
      <div class="field">
        <label class="label" for="businessName">상호명 <span class="required">*</span></label>
        <input class="input" id="businessName" maxlength="80" placeholder="예) 진주OO병원">
      </div>
      <div class="field">
        <label class="label" for="place">장소 <span class="required">*</span></label>
        <input class="input" id="place" maxlength="160" placeholder="배송 장소 또는 행사 장소">
      </div>
      <div class="grid2">
        <div class="field">
          <label class="label" for="eventDate">날짜 <span class="required">*</span></label>
          <input class="input" type="date" id="eventDate">
        </div>
        <div class="field">
          <label class="label" for="eventTime">시간 <span class="required">*</span></label>
          <input class="input" type="time" id="eventTime">
        </div>
      </div>
      <div class="field">
        <label class="label" for="menuText">도시락메뉴/수량 <span class="required">*</span></label>
        <textarea class="textarea" id="menuText" maxlength="500" placeholder="예) 김치제육&떡갈비 20개, 프리미엄 VIP 도시락 5개"></textarea>
      </div>
      <div class="field">
        <label class="label" for="requestNote">요청사항</label>
        <textarea class="textarea" id="requestNote" maxlength="500" placeholder="포장, 알레르기, 수저 필요 여부, 담당자 연락처 등"></textarea>
      </div>
      <div class="field">
        <div class="label">결제 <span class="required">*</span></div>
        <div class="pay-row">
          <label class="pay"><input type="checkbox" id="payCash"> 현금</label>
          <label class="pay"><input type="checkbox" id="payTransfer"> 이체</label>
          <label class="pay"><input type="checkbox" id="payCard"> 카드계산</label>
        </div>
      </div>
      <button class="submit" id="submitBtn" type="submit">주문 접수하기</button>
      <div class="msg" id="formMsg"></div>
    </form>
    <a class="back" href="./customer.html">월식 주문앱으로 돌아가기</a>
  </section>
</main>

<script>
const form = document.getElementById('event-order-form');
const msg = document.getElementById('formMsg');
const btn = document.getElementById('submitBtn');

function value(id) {
  return document.getElementById(id).value.trim();
}

function setMsg(text, type) {
  msg.textContent = text;
  msg.className = `msg ${type}`;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const paymentCash = document.getElementById('payCash').checked;
  const paymentTransfer = document.getElementById('payTransfer').checked;
  const paymentCard = document.getElementById('payCard').checked;
  const payload = {
    businessName: value('businessName'),
    place: value('place'),
    eventDate: value('eventDate'),
    eventTime: value('eventTime'),
    menuText: value('menuText'),
    requestNote: value('requestNote'),
    paymentCash,
    paymentTransfer,
    paymentCard,
    status: 'new',
    source: 'publicEventPage',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  if (!payload.businessName || !payload.place || !payload.eventDate || !payload.eventTime || !payload.menuText) {
    setMsg('필수 항목을 모두 입력해주세요.', 'err');
    return;
  }
  if (!paymentCash && !paymentTransfer && !paymentCard) {
    setMsg('결제 방법을 하나 이상 선택해주세요.', 'err');
    return;
  }
  btn.disabled = true;
  btn.textContent = '접수 중...';
  try {
    await db.collection('eventOrders').add(payload);
    form.reset();
    setMsg('행사도시락 주문이 접수되었습니다. 확인 후 연락드리겠습니다.', 'ok');
  } catch (err) {
    console.error(err);
    setMsg('접수에 실패했습니다. 잠시 후 다시 시도해주세요.', 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '주문 접수하기';
  }
});
</script>
</body>
</html>
